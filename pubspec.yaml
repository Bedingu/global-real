name: global_real
description: "Global Real - Investimentos Imobiliários"
publish_to: 'none'

version: 1.4.1+19

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  table_calendar: ^3.0.9
  supabase_flutter: ^2.12.0
  flutter_svg: ^2.0.10
  url_launcher: ^6.2.6
  google_maps_flutter: ^2.6.0
  flutter_dotenv: ^5.1.0

  flutter_localizations:
    sdk: flutter

  intl: 0.20.2
  cupertino_icons: ^1.0.8

  # Networking (API / Backend)
  http: ^1.2.1

  # Persistência de login
  shared_preferences: ^2.5.4

  # Gráficos financeiros
  fl_chart: ^0.66.0

  # Vídeo
  video_player: ^2.8.1
  chewie: ^1.8.0

  # Splash screen
  flutter_native_splash: ^2.4.7
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

dependency_overrides:
  path_provider_foundation: 2.5.1
  objective_c: 4.1.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/logo_global_real.png
    - assets/icons/
    - assets/icons/demand_drivers/
    - assets/.env

flutter_native_splash:
  color: "#232845"
  image: assets/images/logo_global_real.png
  android: true
  ios: true