workflows:
  # ============================================
  # iOS - Build & Publish to App Store Connect
  # ============================================
  ios-workflow:
    name: iOS Build & Deploy
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.globalreal.app
      flutter: stable
      xcode: 16.4
      vars:
        BUNDLE_ID: "com.globalreal.app"
        APP_STORE_APPLE_ID: 6761792961
    scripts:
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Patch PathProviderPlugin crash
        script: |
          echo "Removing PathProviderPlugin from GeneratedPluginRegistrant.m to fix iOS 18.7 crash..."
          REGISTRANT_FILE="ios/Runner/GeneratedPluginRegistrant.m"
          if [ -f "$REGISTRANT_FILE" ]; then
            sed -i '' '/path_provider_foundation/d' "$REGISTRANT_FILE"
            sed -i '' '/PathProviderPlugin/d' "$REGISTRANT_FILE"
            echo "PathProviderPlugin removed successfully"
            cat "$REGISTRANT_FILE"
          fi
      - name: Install CocoaPods
        script: |
          cd ios && pod install --repo-update
      - name: Build IPA
        script: |
          flutter build ipa --release \
            --build-name=1.3.10 \
            --build-number=$(($(app-store-connect get-latest-testflight-build-number "$APP_STORE_APPLE_ID" || echo 0) + 1)) \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Global Real Testers
